name: Release Nimbus

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nimbus-release-main
  cancel-in-progress: false

jobs:
  release:
    name: Test, package, and publish
    runs-on: windows-latest
    env:
      NIMBUS_DISABLE_DOTENV: "1"
      NIMBUS_DISABLE_UPDATES: "1"
      PYTHONUTF8: "1"
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip; python -m pip install -r requirements.txt "pyinstaller>=6.20"

      - name: Test in a clean environment
        run: python -m pytest -q

      - name: Set automated release version
        shell: pwsh
        run: |
          $version = "1.0.$env:GITHUB_RUN_NUMBER"
          "NIMBUS_VERSION=$version" >> $env:GITHUB_ENV
          Set-Content version.py "APP_VERSION = `"$version`"" -Encoding utf8

      - name: Build Nimbus
        run: python -m PyInstaller nimbus.spec --noconfirm

      - name: Verify frozen runtime imports
        shell: pwsh
        run: |
          $process = Start-Process -FilePath .\dist\Nimbus\Nimbus.exe -ArgumentList "--selftest" -PassThru -Wait
          if ($process.ExitCode -ne 0) { exit $process.ExitCode }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Build installer
        shell: pwsh
        run: iscc "/DAppVersion=$env:NIMBUS_VERSION" installer\nimbus.iss

      - name: Create or update GitHub Release
        shell: pwsh
        run: |
          $tag = "v$env:NIMBUS_VERSION"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "Nimbus $env:NIMBUS_VERSION" --generate-notes --latest
          }
          gh release upload $tag installer\Output\Nimbus-Windows-Setup-v${env:NIMBUS_VERSION}.exe --clobber
